# FreeGSM-DoH 설정 파일 (선택 사항)
# 값이 있는 항목만 기본값을 덮어씁니다.
# 우선순위: 환경 변수 > config.yml > 내장 기본값

# DoH 업스트림 URL (반드시 IP로 지정해야 부트스트랩 DNS 없이 연결됩니다)
# 기본값: https://1.0.0.1/dns-query  (Cloudflare 보조 IP)
# 대안:
#   https://8.8.8.8/dns-query        (Google)
#   https://9.9.9.9/dns-query        (Quad9)
#   https://1.1.1.1/dns-query        (Cloudflare 기본 IP, 일부 네트워크에서 차단됨)
doh_url: https://1.0.0.1/dns-query

# SNI 기반 DPI 우회(443 릴레이) 활성화 여부
# false로 설정하면 DoH만 동작하고 443 릴레이는 비활성화됩니다.
# 기본값: true
dpi_bypass: true
